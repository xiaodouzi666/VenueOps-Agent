services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - ./.env.example
    ports:
      - "8080:8080"
  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
