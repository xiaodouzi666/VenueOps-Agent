apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: venueops-web
spec:
  template:
    spec:
      containers:
        - image: us-central1-docker.pkg.dev/PROJECT_ID/venueops/venueops-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://venueops-api-PROJECT_HASH-us-central1.a.run.app
